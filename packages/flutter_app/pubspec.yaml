name: ephem_flutter
description: Ephem 临时加密聊天室 Flutter 客户端（Android/Windows/macOS）
publish_to: "none"
version: 0.3.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # WebSocket 客户端
  web_socket_channel: ^2.4.0

  # HKDF + AES-256-GCM（纯 Dart，跨平台一致）
  cryptography: ^2.5.0

  # 设置持久化
  shared_preferences: ^2.2.0

  # 设置页里"打开浏览器"跳转按钮
  # 锁在 6.1.x：6.2+ 需要 Dart 3.1+，与 Flutter 3.10 不兼容
  url_launcher: ">=6.1.0 <6.2.0"
  file_picker: ^8.0.7
  image: ^4.9.1

  #cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
