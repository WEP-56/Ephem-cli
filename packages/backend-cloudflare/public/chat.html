<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ephem · Web 聊天</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="stylesheet" href="/chat.css" />
</head>
<body>
  <main class="shell">
    <section id="connectView" class="connect-view">
      <div class="brand-row">
        <div>
          <div class="brand-title">
            <img src="/logo.png" alt="" />
            <h1>ephem<span>·</span>chat</h1>
          </div>
          <p>输入房间码和用户名加入临时加密聊天室。</p>
        </div>
        <a class="admin-link" href="/" title="打开房间管理">管理</a>
      </div>

      <form id="connectForm" class="connect-form" autocomplete="off">
        <label>
          <span>房间码</span>
          <input id="roomCode" name="roomCode" inputmode="latin" placeholder="correct-horse-battery" required />
        </label>
        <label>
          <span>用户名</span>
          <input id="username" name="username" maxlength="32" placeholder="匿名" />
        </label>
        <button id="joinBtn" type="submit">加入房间</button>
        <div id="connectError" class="error" role="status"></div>
      </form>
    </section>

    <section id="chatView" class="chat-view" hidden>
      <header class="chat-header">
        <div>
          <div id="roomTitle" class="room-title"></div>
          <div id="roomMeta" class="room-meta"></div>
        </div>
        <div class="header-actions">
          <span id="connState" class="conn-state">连接中</span>
          <button id="exportBtn" class="ghost-btn" type="button" title="导出聊天记录">导出</button>
          <button id="leaveBtn" class="ghost-btn" type="button" title="离开房间">离开</button>
        </div>
      </header>

      <div id="messageList" class="message-list" aria-live="polite">
        <button id="loadHistoryBtn" class="ghost-btn load-history" type="button" hidden>加载更早记录</button>
      </div>

      <form id="messageForm" class="composer">
        <input id="imageInput" type="file" accept="image/*" hidden />
        <button id="imageBtn" class="icon-btn" type="button" title="发送图片">＋</button>
        <textarea id="messageInput" rows="1" placeholder="输入消息..." autocomplete="off"></textarea>
        <button id="sendBtn" type="submit">发送</button>
      </form>
    </section>

    <section id="archiveView" class="chat-view" hidden>
      <header class="chat-header">
        <div>
          <div class="room-title">记录</div>
          <div class="room-meta">导入或查看本地 .ephem 聊天记录</div>
        </div>
        <div class="header-actions">
          <input id="archiveImportInput" type="file" accept=".ephem,application/octet-stream,application/gzip" hidden />
          <button id="archiveImportBtn" class="ghost-btn" type="button">导入</button>
          <button id="archiveBackBtn" class="ghost-btn" type="button">返回</button>
        </div>
      </header>
      <div id="archiveList" class="message-list"></div>
      <div id="archiveViewer" class="message-list" hidden></div>
    </section>

    <nav class="bottom-tabs">
      <button id="chatTab" class="tab active" type="button">聊天</button>
      <button id="archiveTab" class="tab" type="button">记录</button>
    </nav>
  </main>

  <div id="imageLightbox" class="lightbox" hidden>
    <button id="lightboxClose" type="button" aria-label="关闭">×</button>
    <img id="lightboxImage" alt="" />
    <div id="lightboxMeta"></div>
  </div>

  <script src="/chat.js"></script>
</body>
</html>
