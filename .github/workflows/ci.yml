name: CI

# 每次 push 到 main 或开 PR 时跑：保证提交不破坏构建
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CLI 类型检查 + 构建 ──────────────────────
  cli-build:
    name: CLI Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: packages/cli/package-lock.json

      - name: Install
        working-directory: packages/cli
        run: npm ci

      - name: Type check
        working-directory: packages/cli
        run: npx tsc --noEmit

      - name: Build
        working-directory: packages/cli
        run: npm run build

      - name: Verify binary runs
        working-directory: packages/cli
        run: node dist/index.js --help

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: packages/cli/dist/
          retention-days: 7

  # ── 后端类型检查 ────────────────────────────
  backend-typecheck:
    name: Backend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: packages/backend-cloudflare/package-lock.json

      - name: Install
        working-directory: packages/backend-cloudflare
        run: npm ci

      - name: Type check
        working-directory: packages/backend-cloudflare
        run: npx tsc --noEmit

  # ── Flutter 端分析 ──────────────────────────
  flutter-analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    continue-on-error: true  # Flutter 端 lint 不阻塞主线
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          # 用最新 stable，避免 Dart SDK 与依赖版本不匹配

      - name: Pub get
        working-directory: packages/flutter_app
        run: flutter pub get

      # android/ 平台脚手架已纳入版本控制，无需再临时生成。
      # flutter analyze 只检查 Dart 代码，不依赖平台目录。
      - name: Analyze
        working-directory: packages/flutter_app
        run: flutter analyze

