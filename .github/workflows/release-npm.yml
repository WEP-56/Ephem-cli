name: Release NPM

# 触发条件：推送 v* 格式的 tag（如 v0.1.0、v1.2.3）
# 也可以在 Actions 页面手动触发
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-npm:
    name: Publish ephem-cli to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # npm provenance（来源证明）需要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: packages/cli/package-lock.json

      - name: Install dependencies
        working-directory: packages/cli
        run: npm ci

      - name: Type check
        working-directory: packages/cli
        run: npx tsc --noEmit

      - name: Build
        working-directory: packages/cli
        run: npm run build

      - name: Verify package contents (dry run)
        working-directory: packages/cli
        run: npm publish --dry-run

      - name: Publish to npm
        working-directory: packages/cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## NPM Publish Result" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ ephem-cli@$(node -p "require('./packages/cli/package.json').version") published to npm" >> $GITHUB_STEP_SUMMARY
            echo "View at: https://www.npmjs.com/package/ephem-cli" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Publish failed. Check logs above." >> $GITHUB_STEP_SUMMARY
          fi
